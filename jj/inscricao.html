<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Copa Jiu-Jitsu Cajati</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff1f1f;
            --bg-dark: #050505;
            --surface: #121212;
            --input-bg: #1a1a1a;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .reg-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* Sidebar */
        .reg-sidebar {
            background: linear-gradient(135deg, var(--primary), #880000);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .reg-sidebar h2 { font-family: 'Oswald'; font-size: 2.5rem; line-height: 1; margin-bottom: 30px; }
        .steps { list-style: none; }
        .step-item { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; opacity: 0.7; }
        .step-item.active { opacity: 1; font-weight: 700; }
        .step-icon { width: 32px; height: 32px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .step-item.active .step-icon { background: white; color: var(--primary); }

        /* Form Content */
        .reg-form-content { padding: 50px 60px; }
        .reg-form-content h3 { font-family: 'Oswald'; font-size: 1.8rem; margin-bottom: 30px; border-bottom: 2px solid var(--primary); display: inline-block; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        input, select {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(255, 31, 31, 0.2); }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Oswald';
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, background 0.3s;
        }
        .btn-submit:hover { background: #cc0000; transform: translateY(-2px); }

        @media (max-width: 800px) {
            .reg-card { grid-template-columns: 1fr; }
            .reg-sidebar { display: none; }
            .reg-form-content { padding: 40px 25px; }
        }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="reg-sidebar">
            <div>
                <h2>PORTAL DO ATLETA</h2>
                <ul class="steps">
                    <li class="step-item active">
                        <div class="step-icon">1</div>
                        <span>Dados Pessoais</span>
                    </li>
                    <li class="step-item">
                        <div class="step-icon">2</div>
                        <span>Pagamento</span>
                    </li>
                    <li class="step-item">
                        <div class="step-icon">3</div>
                        <span>Confirmação</span>
                    </li>
                </ul>
            </div>
            <div style="font-size: 0.8rem; opacity: 0.8;">
                <p><i class="fa-solid fa-shield-halved"></i> Ambiente Seguro</p>
                <p>Suporte: suporte@copacajati.com</p>
            </div>
        </div>

        <div class="reg-form-content">
            <h3>Ficha de Inscrição</h3>
            <form id="registrationForm">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" name="nome" required placeholder="Ex: Rodrigo Cavalcanti">
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1.2;">
                        <label>CPF</label>
                        <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">
                    </div>
                    <div class="form-group" style="flex: 0.8;">
                        <label>Faixa</label>
                        <select id="faixa" name="faixa">
                            <option value="Branca">Branca</option>
                            <option value="Azul">Azul</option>
                            <option value="Roxa">Roxa</option>
                            <option value="Marrom">Marrom</option>
                            <option value="Preta">Preta</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Academia / Equipe</label>
                    <input type="text" id="equipe" name="equipe" required placeholder="Sua escola de Jiu-Jitsu">
                </div>

                <div class="form-group">
                    <label>Modalidade</label>
                    <select id="plano" name="plano">
                        <option value="Categoria (R$ 100,00)" data-price="100.00">Apenas Categoria (R$ 100,00)</option>
                        <option value="Combo Categoria + Absoluto (R$ 150,00)" data-price="150.00">Categoria + Absoluto (R$ 150,00)</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Avançar para Pagamento <i class="fa-solid fa-arrow-right"></i></button>
                <p style="text-align: center; color: var(--text-muted); font-size: 0.7rem; margin-top: 15px;">
                    Ao clicar em avançar, você declara estar apto fisicamente para a competição.
                </p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect data
            const formData = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                faixa: document.getElementById('faixa').value,
                equipe: document.getElementById('equipe').value,
                plano: document.getElementById('plano').value,
                valor: document.getElementById('plano').options[document.getElementById('plano').selectedIndex].getAttribute('data-price')
            };

            // Send to API
            fetch('api/salvar_inscricao.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    // Save to localStorage for the payment page display
                    formData.registrationId = result.id;
                    formData.pix_qr_code = result.pix_qr_code || '';
                    formData.pix_image = result.pix_image || '';
                    formData.card_link = result.card_link || '';
                    
                    localStorage.setItem('competidorData', JSON.stringify(formData));
                    // Redirect
                    window.location.href = 'pagamento.html';
                } else {
                    alert('Erro ao salvar inscrição: ' + result.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                // Fallback to localStorage only if API fails (for local testing without PHP)
                localStorage.setItem('competidorData', JSON.stringify(formData));
                window.location.href = 'pagamento.html';
            });
        });

        // Simple CPF Mask (Basic)
        document.getElementById('cpf').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/);
            e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + (x[3] ? '.' + x[3] : '') + (x[4] ? '-' + x[4] : '');
        });
    </script>
</body>
</html>
